# docker-compose.yml — ShuttliX v2.0 local dev stack
# Usage: docker compose up -d
# Frontend still runs via `npm run dev` on the host (hot reload)

version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: shuttlix-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: shuttlix
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shuttlix-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shuttlix-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/shuttlix
      REDIS_URL:   redis://redis:6379
      NODE_ENV:    development
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  mongo_data:
  redis_data:
